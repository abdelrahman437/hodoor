name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Build debug APK
        run: |
          chmod +x gradlew
          set -o pipefail
          ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee build.log

      - name: Report build failure as issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo '```' > err.md
          grep -E "e: |error:|FAILURE|What went wrong|Caused by|> Task|Execution failed" build.log | tail -n 120 >> err.md || true
          echo '' >> err.md
          echo '----- FULL TAIL -----' >> err.md
          tail -n 120 build.log >> err.md
          echo '```' >> err.md
          gh issue create --title "CI build error (run ${{ github.run_number }})" --body-file err.md

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hodoor-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
